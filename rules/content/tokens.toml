[[rules]]
name = "TokenPatterns"
scope = "ContentsEnumeration"
match_location = "FileContentAsString"
match_type = "Regex"
patterns = [
    'xox[pboa]-[0-9]{10,}',
    'hooks\.slack\.com/services/T[A-Z0-9]+/B[A-Z0-9]+/[A-Za-z0-9]+',
    'ghp_[A-Za-z0-9]{36}',
    'gho_[A-Za-z0-9]{36}',
    'github_pat_[A-Za-z0-9]{22}_[A-Za-z0-9]{59}',
    'glpat-[A-Za-z0-9\-_]{20,}',
    'discord\.com/api/webhooks/\d+/[A-Za-z0-9_-]+',
    'SG\.[A-Za-z0-9_-]{20,}',
    'npm_[A-Za-z0-9]{36}',
    'pypi-[A-Za-z0-9_-]{16,}',
    'sk-proj-[A-Za-z0-9_-]{40,}',
    'sk-ant-[A-Za-z0-9_-]{40,}',
    '\bhf_[A-Za-z0-9]{34}\b',
    'hv[sb]\.[A-Za-z0-9_-]{24,}',
    'shp(at|ss|ca|pa)_[a-fA-F0-9]{32}',
]
action = "Snaffle"
triage = "Red"
skip_comments = true
exclude_patterns = [
    '(?i)(example|sample|placeholder|your.?token|test.?token|dummy|CHANGE.?ME)',
    '(?i)x{4,}',
    '(?i)redacted',
]
max_size = 1048576
context_bytes = 200
description = "SaaS tokens and webhooks -- Slack, GitHub, GitLab, Discord, JWT"

[[rules]]
name = "VendorPrefixTokens"
scope = "ContentsEnumeration"
match_location = "FileContentAsString"
match_type = "Regex"
patterns = [
    # Fly.io (legacy fo1_ and current FlyV1 fm… formats)
    'fo1_[A-Za-z0-9_-]{40,}',
    'FlyV1 fm[0-9][a-z]?_[A-Za-z0-9+/_=-]{30,}',
    # 1Password service account (ops_ + base64 JWT-like)
    'ops_eyJ[A-Za-z0-9_-]{60,}',
    # OpenShift / Kubernetes sha256~ token
    'sha256~[A-Za-z0-9_-]{43}',
    # Square access tokens
    'sq0(atp|csp|idp)-[A-Za-z0-9_-]{22,}',
    'EAAA[A-Za-z0-9_-]{59,}',
    # age secret key (bech32, uppercase)
    'AGE-SECRET-KEY-1[0-9A-Z]{58}',
    # Databricks PAT
    'dapi[a-f0-9]{32}(-[0-9]+)?',
    # Twilio API key (SK + 32 hex)
    '\bSK[0-9a-f]{32}\b',
    # Alibaba access key id (LTAI + 20 alnum)
    '\bLTAI[A-Za-z0-9]{20}\b',
    # HashiCorp Terraform Cloud token
    '[A-Za-z0-9]{14}\.atlasv1\.[A-Za-z0-9_-]{60,}',
]
action = "Snaffle"
triage = "Red"
skip_comments = true
exclude_patterns = [
    '(?i)(example|sample|placeholder|dummy|CHANGE.?ME)',
    '(?i)x{4,}',
]
max_size = 1048576
context_bytes = 200
description = "Distinctive-prefix vendor tokens -- Fly.io, 1Password, OpenShift, Square, age, Octopus, Databricks, Mailchimp, HashiCorp"

[[rules]]
name = "VendorKeywordSecrets"
scope = "ContentsEnumeration"
match_location = "FileContentAsString"
match_type = "Regex"
patterns = [
    # Snyk / Heroku / HubSpot -- UUID gated on the vendor keyword.
    # [?:]?[=:]+ accepts := / ::= / ?= Makefile-style assignment.
    "(?i)(snyk|heroku|hubspot)[a-z0-9_]*\\s*[?:]?[=:]+\\s*[\"']?[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}",
    # Algolia admin/api key (32 hex gated on keyword)
    "(?i)algolia[a-z0-9_]*\\s*[?:]?[=:]+\\s*[\"']?[a-f0-9]{32}\\b",
    # Sidekiq enterprise/gems (hex:hex gated on the env-var name)
    "(?i)BUNDLE_(?:ENTERPRISE|GEMS)__CONTRIBSYS__COM\\s*[=:]+\\s*[\"']?[a-f0-9]+:[a-f0-9]+",
    # Facebook app secret (32 hex gated on keyword)
    "(?i)facebook[a-z0-9_]*secret\\s*[=:]+\\s*[\"']?[a-f0-9]{32}\\b",
    # Sumo Logic access id (su... gated on sumo/sumologic keyword)
    "(?i)sumo(?:logic)?[._-]?access[._-]?id\\s*[=:]+\\s*[\"']?su[A-Za-z0-9]{12,}",
    # Okta API token (00 + 38..40 gated on keyword; \b avoids mid-word 'okta')
    "(?i)\\bokta[a-z0-9_]*[\"']?\\s*[=:]+\\s*[\"']?00[A-Za-z0-9_-]{38,}\\b",
    # Octopus Deploy API key (gated on apikey to avoid generic API- noise)
    "(?i)api[_-]?key\\s*[=:]+\\s*[\"']?API-[A-Z0-9]{26,}",
    # Vault legacy service token (gated on token/vault keyword)
    "(?i)(?:vault|token)\\s*[=:]+\\s*[\"']?s\\.[A-Za-z0-9]{24}\\b",
    # Mailchimp (32 hex + datacenter suffix, gated on keyword)
    "(?i)mailchimp[a-z0-9_]*\\s*[=:]+\\s*[\"']?[0-9a-f]{32}-us[0-9]{1,2}",
    # Scalingo (tk-<region>- gated on keyword)
    "(?i)scalingo[a-z0-9_]*\\s*[=:]+\\s*[\"']?tk-[a-z]{2}-[A-Za-z0-9_-]{30,}",
]
action = "Snaffle"
triage = "Red"
skip_comments = true
exclude_patterns = [
    '(?i)(example|sample|placeholder|dummy|CHANGE.?ME)',
    '(?i)x{4,}',
    '0{6,}',
]
max_size = 1048576
context_bytes = 200
description = "Keyword-gated vendor secrets -- Snyk, Heroku, HubSpot, Sidekiq, Facebook, Sumo Logic, Okta, Octopus, Vault"

[[rules]]
name = "JwtTokens"
scope = "ContentsEnumeration"
match_location = "FileContentAsString"
match_type = "Regex"
patterns = [
    'eyJ[A-Za-z0-9_-]{10,}\.eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_.+/=-]+',
]
action = "Snaffle"
triage = "Red"
skip_comments = true
exclude_patterns = [
    '(?i)(placeholder|dummy|redacted)',
]
max_size = 1048576
context_bytes = 200
description = "JSON Web Tokens (3-segment) -- kept separate so surrounding words like 'example' do not suppress real tokens"

[[rules]]
name = "ApiTokenAssignments"
scope = "ContentsEnumeration"
match_location = "FileContentAsString"
match_type = "Regex"
patterns = [
    # <vendor>_api_token = "value" / api-token: value  (strong keyword signal)
    "(?i)api[_-]?token\\s*[?:]?[=:]\\s*[\"']?[^\\s\"']{12,}",
    # Intra42 client secret (now resolvable: s-s4t2XX- + 64 hex)
    's-s4t2[a-z0-9]{2}-[a-f0-9]{64}',
]
action = "Snaffle"
triage = "Red"
skip_comments = true
exclude_patterns = [
    '(?i)(example|sample|placeholder|your.?token|dummy|CHANGE.?ME)',
    '(?i)x{4,}',
]
max_size = 1048576
context_bytes = 200
description = "Generic api_token assignments and intra42 client secrets"
