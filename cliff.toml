[changelog]
header = ""

body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/dejisec/niffler/commit/{{ commit.id }}))
{%- endfor %}
{% endfor %}
{% if previous.version and version -%}
**Full Changelog**: https://github.com/dejisec/niffler/compare/{{ previous.version }}...{{ version }}
{% endif -%}
"""

footer = ""

trim = true

[git]
conventional_commits = true
filter_unconventional = false
filter_commits = false
tag_pattern = "v[0-9]*"
sort_commits = "newest"

commit_parsers = [
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore\\(version\\)", skip = true },
    { message = "^chore: release", skip = true },
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactoring" },
    { message = "^docs", group = "Documentation" },
    { message = "^test", group = "Testing" },
    { message = "^style", group = "Styling" },
    { message = "^ci", group = "CI/CD" },
    { message = "^build", group = "Build" },
    { message = "^chore", group = "Miscellaneous" },
    { message = ".*", group = "Miscellaneous" },
]
